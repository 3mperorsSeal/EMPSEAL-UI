<!DOCTYPE html>

<head>

      type="image/x-icon"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>EMPX - Multi-Chain DeFi Trading Platform</title>
    <meta name="title" content="EMPX - Multi-Chain DeFi Trading Platform" />

    <meta name="author" content="EMPX Protocol" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dapp.empx.io/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dapp.empx.io/" />
    <meta property="og:title" content="EMPX - Multi-Chain DeFi Trading Platform" />
    <meta property="og:description" content="Trade cryptocurrencies on EMPX DeFi platform with advanced features including multi-chain swapping, bridging, limit orders, and gasless transactions." />
    <meta property="og:image" content="https://dapp.empx.io/src/assets/images/emp-logo.png" />
    <meta property="og:site_name" content="EMPX DeFi Platform" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dapp.empx.io/" />
    <meta property="twitter:title" content="EMPX - Multi-Chain DeFi Trading Platform" />
    <meta property="twitter:description" content="Trade cryptocurrencies on EMPX DeFi platform with advanced features including multi-chain swapping, bridging, limit orders, and gasless transactions." />
    <meta property="twitter:image" content="https://dapp.empx.io/src/assets/images/emp-logo.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS / Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/src/assets/images/emp-logo.png" />
    <meta name="apple-mobile-web-app-title" content="EMPX" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EMPX DeFi Platform",
      "url": "https://dapp.empx.io/",
      "description": "Multi-chain decentralized finance platform for cryptocurrency trading with advanced features",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "EMPX Protocol",
        "url": "https://dapp.empx.io/"
      },
      "featureList": [
        "Multi-chain swapping",
        "Cross-chain bridging",
        "Limit order trading",
        "Gas optimization",
        "Decentralized finance"
      ]
    }
    </script>
</head>
